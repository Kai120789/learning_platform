version: "3"

dotenv:
  - .env

tasks:
  default:
    cmds:
      - task: migrate_up_user
      - task: migrate_down_user
      - task: migrate_up_group
      - task: migrate_down_group
      - task: migrate_up_lesson
      - task: migrate_down_lesson
      - task: migrate_up_subject
      - task: migrate_down_subject
  migrate_up_user:
    aliases:
      - gen
    desc: "up migrations to user db"
    cmds:
      -  migrate -path ./learning_platform_users/migrations -database "${USER_DBDSN}?sslmode=disable" up
  migrate_down_user:
    aliases:
      - gen
    desc: "down migrations to user db"
    cmds:
      - migrate -path ./learning_platform_users/migrations -database "${USER_DBDSN}?sslmode=disable" down
  migrate_up_group:
    aliases:
      - gen
    desc: "up migrations to group db"
    cmds:
      - migrate -path ./learning_platform_groups/migrations -database "${GROUP_DBDSN}?sslmode=disable" up
  migrate_down_group:
    aliases:
      - gen
    desc: "down migrations to group db"
    cmds:
      - migrate -path ./learning_platform_groups/migrations -database "${GROUP_DBDSN}?sslmode=disable" down
  migrate_up_lesson:
    aliases:
      - gen
    desc: "up migrations to lesson db"
    cmds:
      - migrate -path ./learning_platform_lessons/migrations -database "${LESSON_DBDSN}?sslmode=disable" up
  migrate_down_lesson:
    aliases:
      - gen
    desc: "down migrations to lesson db"
    cmds:
      - migrate -path ./learning_platform_lessons/migrations -database "${LESSON_DBDSN}?sslmode=disable" down
  migrate_up_subject:
    aliases:
      - gen
    desc: "up migrations to subject db"
    cmds:
      - migrate -path ./learning_platform_subjects/migrations -database "${SUBJECT_DBDSN}?sslmode=disable" up
  migrate_down_subject:
    aliases:
      - gen
    desc: "down migrations to subject db"
    cmds:
      - migrate -path ./learning_platform_subjects/migrations -database "${SUBJECT_DBDSN}?sslmode=disable" down